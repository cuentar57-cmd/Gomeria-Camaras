<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAM / CTRL</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0f0f0f;
  --surface:#181818;
  --surface2:#232323;
  --border:#303030;
  --text:#f2f2f2;
  --muted:#7a7a7a;

  --moto:#e8ff47;
  --bici:#47c8ff;
  --auto:#ff6b47;
  --picos:#b47fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
}

header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:16px;
}

.logo{
  color:var(--moto);
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:1rem;
}

main{
  padding:14px;
}

/* TABS */

.tabs{
  display:flex;
  gap:8px;
  overflow-x:auto;
  scrollbar-width:none;
  margin-bottom:16px;
}

.tabs::-webkit-scrollbar{
  display:none;
}

.tab{
  border:none;
  min-width:120px;
  padding:10px 14px;
  border-radius:10px;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--muted);
  font-weight:700;
  cursor:pointer;
  flex-shrink:0;
}

.tab.active{
  color:#000;
}

.tab.moto.active{ background:var(--moto); }
.tab.bici.active{ background:var(--bici); }
.tab.auto.active{ background:var(--auto); }
.tab.picos.active{ background:var(--picos); }

/* RESUMEN */

.resume{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-bottom:16px;
}

.resume-title{
  color:var(--muted);
  font-size:0.72rem;
  margin-bottom:12px;
  font-family:'Space Mono',monospace;
}

.resume-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

/* ACCIONES */

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.btn{
  border:none;
  border-radius:10px;
  padding:12px 14px;
  font-weight:700;
  cursor:pointer;
}

.btn-save{
  background:var(--moto);
  color:#000;
}

.btn-summary{
  background:var(--bici);
  color:#000;
}

.btn-reset{
  background:var(--auto);
  color:#fff;
}

/* SECCIONES */

.section{
  display:none;
}

.section.active{
  display:block;
}

/* GRID */

.items-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.item{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
}

.item-title{
  font-size:0.82rem;
  font-weight:700;
}

.item-stock{
  font-size:0.68rem;
  color:var(--muted);
  margin-top:4px;
}

.item-date{
  font-size:0.55rem;
  color:var(--muted);
  margin-top:8px;
  min-height:16px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:12px;
}

.counter{
  display:flex;
  align-items:center;
  gap:8px;
}

.counter button{
  width:30px;
  height:30px;
  border:none;
  border-radius:8px;
  background:var(--surface2);
  color:#fff;
  font-size:1rem;
  cursor:pointer;
}

.counter-value{
  min-width:24px;
  text-align:center;
  font-weight:700;
}

.stock-left{
  font-size:0.7rem;
  color:var(--muted);
}

/* RESUMEN DEL DÍA */

.summary{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-top:18px;
  display:none;
}

.summary-title{
  color:var(--muted);
  font-size:0.72rem;
  margin-bottom:14px;
  font-family:'Space Mono',monospace;
}

.summary-line{
  padding:8px 0;
  border-bottom:1px solid var(--border);
  font-size:0.8rem;
}

/* REGISTROS */

.logs{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-top:18px;
}

.logs-title{
  color:var(--muted);
  font-size:0.72rem;
  margin-bottom:14px;
  font-family:'Space Mono',monospace;
}

.log{
  border-bottom:1px solid var(--border);
  padding:12px 0;
}

.log:last-child{
  border-bottom:none;
}

.log-date{
  color:var(--muted);
  font-size:0.65rem;
  margin-bottom:8px;
}

.log-content{
  font-size:0.78rem;
  line-height:1.6;
}

.log-content strong{
  color:var(--moto);
}

@media(min-width:700px){

  .items-grid{
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  }

}

</style>
</head>

<body>

<header>
  <div class="logo">CAM / CTRL</div>
</header>

<main>

<div class="tabs">

  <button class="tab moto active" onclick="switchTab('moto',this)">
    🏍️ Motos
  </button>

  <button class="tab bici" onclick="switchTab('bici',this)">
    🚲 Bicis
  </button>

  <button class="tab auto" onclick="switchTab('auto',this)">
    🚗 Autos
  </button>

  <button class="tab picos" onclick="switchTab('picos',this)">
    📌 Picos
  </button>

</div>

<div class="resume">

  <div class="resume-title">
    // STOCK CARGADO
  </div>

  <div class="resume-row">
    <span>Motos</span>
    <strong id="resume-moto">0</strong>
  </div>

  <div class="resume-row">
    <span>Bicis</span>
    <strong id="resume-bici">0</strong>
  </div>

  <div class="resume-row">
    <span>Autos</span>
    <strong id="resume-auto">0</strong>
  </div>

  <div class="resume-row">
    <span>Picos</span>
    <strong id="resume-picos">0</strong>
  </div>

</div>

<div class="actions">

  <button class="btn btn-save" onclick="guardarCierre()">
    Guardar cierre
  </button>

  <button class="btn btn-summary" onclick="mostrarResumen()">
    Ver resumen
  </button>

  <button class="btn btn-reset" onclick="reiniciarVentas()">
    Reiniciar ventas
  </button>

</div>

<div class="section active" id="sec-moto">
  <div class="items-grid" id="grid-moto"></div>
</div>

<div class="section" id="sec-bici">
  <div class="items-grid" id="grid-bici"></div>
</div>

<div class="section" id="sec-auto">
  <div class="items-grid" id="grid-auto"></div>
</div>

<div class="section" id="sec-picos">
  <div class="items-grid" id="grid-picos"></div>
</div>

<div class="summary" id="summaryBox">

  <div class="summary-title">
    // RESUMEN DEL DÍA
  </div>

  <div id="summaryContent"></div>

</div>

<div class="logs">

  <div class="logs-title">
    // CIERRES GUARDADOS
  </div>

  <div id="logsContainer"></div>

</div>

</main>

<script>

const STORAGE_KEY = 'camctrl_stock_real';
const LOGS_KEY = 'camctrl_logs_real';

const CATALOG = {

  moto:[
    '14',
    '17.300',
    '17.400',
    '18.400',
    '18.300',
    '350.10',
    '16',
    '21',
    '15',
    '19',
    '13'
  ],

  bici:[
    '28',
    '29',
    '26',
    '27',
    '12',
    '24',
    '16',
    '20',
    '14'
  ],

  auto:[
    '750.16',
    '700.12',
    '750.20',
    'GR15 TR13',
    'KR16 TR15',
    'GR16 TR15',
    '14',
    '13',
    'GR16 TR13',
    'KR15 TR15',
    '400.8',
    '650.10',
    '600.9',
    '500.8'
  ],

  picos:[
    'Pico Moto',
    'Pico Bici',
    'Pico Auto',
    'Pico Fino',
    'Pico Grueso'
  ]

};

let state = JSON.parse(
  localStorage.getItem(STORAGE_KEY)
) || {};

let logs = JSON.parse(
  localStorage.getItem(LOGS_KEY)
) || [];

function saveState(){

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(state)
  );

}

function saveLogs(){

  localStorage.setItem(
    LOGS_KEY,
    JSON.stringify(logs)
  );

}

function formatDate(ts){

  return new Date(ts).toLocaleString('es-AR',{
    day:'2-digit',
    month:'2-digit',
    year:'2-digit',
    hour:'2-digit',
    minute:'2-digit'
  });

}

function switchTab(cat,el){

  document.querySelectorAll('.section')
    .forEach(s=>s.classList.remove('active'));

  document.querySelectorAll('.tab')
    .forEach(t=>t.classList.remove('active'));

  document.getElementById(
    'sec-' + cat
  ).classList.add('active');

  el.classList.add('active');

}

function buildGrid(cat){

  const grid =
    document.getElementById('grid-' + cat);

  grid.innerHTML =
    CATALOG[cat].map((name,index)=>{

      const key =
        cat + '_' + index;

      if(!state[key]){

        state[key] = {

          stock:0,
          vendidos:0,
          date:null

        };

      }

      const data = state[key];

      const restante =
        data.stock - data.vendidos;

      return `

        <div class="item">

          <div class="item-title">
            ${name}
          </div>

          <div class="item-stock">
            Stock inicial: ${data.stock}
          </div>

          <div class="item-date">

            ${
              data.date
              ? 'Último movimiento: ' + formatDate(data.date)
              : ''
            }

          </div>

          <div class="row">

            <div>

              <div style="font-size:.65rem;color:var(--muted);margin-bottom:6px;">
                Cargar stock
              </div>

              <div class="counter">

                <button onclick="changeStock('${key}',-1)">
                  −
                </button>

                <div class="counter-value">
                  ${data.stock}
                </div>

                <button onclick="changeStock('${key}',1)">
                  +
                </button>

              </div>

            </div>

          </div>

          <div class="row">

            <div>

              <div style="font-size:.65rem;color:var(--muted);margin-bottom:6px;">
                Vendidos
              </div>

              <div class="counter">

                <button onclick="changeVendidos('${key}',-1)">
                  −
                </button>

                <div class="counter-value">
                  ${data.vendidos}
                </div>

                <button onclick="changeVendidos('${key}',1)">
                  +
                </button>

              </div>

            </div>

            <div class="stock-left">
              Restan: ${restante}
            </div>

          </div>

        </div>

      `;

    }).join('');

}

function changeStock(key,delta){

  if(!state[key]){

    state[key] = {
      stock:0,
      vendidos:0,
      date:null
    };

  }

  let next =
    state[key].stock + delta;

  if(next < 0){
    next = 0;
  }

  state[key].stock = next;

  if(state[key].vendidos > next){

    state[key].vendidos = next;

  }

  state[key].date = Date.now();

  saveState();

  refreshAll();

}

function changeVendidos(key,delta){

  if(!state[key]){

    state[key] = {
      stock:0,
      vendidos:0,
      date:null
    };

  }

  let next =
    state[key].vendidos + delta;

  if(next < 0){
    next = 0;
  }

  if(next > state[key].stock){
    next = state[key].stock;
  }

  state[key].vendidos = next;

  state[key].date = Date.now();

  saveState();

  refreshAll();

}

function updateResume(){

  ['moto','bici','auto','picos']
    .forEach(cat=>{

      let total = 0;

      CATALOG[cat]
        .forEach((_,index)=>{

          const key =
            cat + '_' + index;

          total +=
            state[key]?.stock || 0;

        });

      document.getElementById(
        'resume-' + cat
      ).textContent = total;

    });

}

function mostrarResumen(){

  const box =
    document.getElementById('summaryBox');

  const content =
    document.getElementById('summaryContent');

  let html = '';

  Object.keys(CATALOG)
    .forEach(cat=>{

      html += `

        <div class="summary-line">
          <strong>${cat.toUpperCase()}</strong>
        </div>

      `;

      CATALOG[cat]
        .forEach((name,index)=>{

          const key =
            cat + '_' + index;

          const stock =
            state[key]?.stock || 0;

          const vendidos =
            state[key]?.vendidos || 0;

          const restante =
            stock - vendidos;

          html += `

            <div class="summary-line">

              ${name}

              — Stock: ${stock}

              — Vendidos: ${vendidos}

              — Restan: ${restante}

            </div>

          `;

        });

    });

  content.innerHTML = html;

  box.style.display = 'block';

}

function guardarCierre(){

  const items = [];

  Object.keys(CATALOG)
    .forEach(cat=>{

      CATALOG[cat]
        .forEach((name,index)=>{

          const key =
            cat + '_' + index;

          const data =
            state[key];

          if(data && data.stock > 0){

            items.push({

              categoria:cat,
              nombre:name,
              stock:data.stock,
              vendidos:data.vendidos,
              restante:data.stock - data.vendidos

            });

          }

        });

    });

  logs.unshift({

    fecha:Date.now(),
    items

  });

  if(logs.length > 30){

    logs = logs.slice(0,30);

  }

  saveLogs();

  renderLogs();

  alert('Cierre guardado correctamente');

}

function renderLogs(){

  const container =
    document.getElementById('logsContainer');

  if(!logs.length){

    container.innerHTML =
      '<div style="color:var(--muted)">No hay cierres guardados</div>';

    return;

  }

  container.innerHTML =
    logs.map(log=>`

      <div class="log">

        <div class="log-date">
          ${formatDate(log.fecha)}
        </div>

        <div class="log-content">

          ${
            log.items.map(item=>`

              <div>

                <strong>
                  ${item.categoria.toUpperCase()}
                </strong>

                —
                ${item.nombre}

                | Stock: ${item.stock}

                | Vendidos: ${item.vendidos}

                | Restan: ${item.restante}

              </div>

            `).join('')
          }

        </div>

      </div>

    `).join('');

}

function reiniciarVentas(){

  if(!confirm('¿Reiniciar ventas del día?')){
    return;
  }

  Object.keys(state)
    .forEach(key=>{

      state[key].vendidos = 0;

    });

  saveState();

  refreshAll();

}

function refreshAll(){

  ['moto','bici','auto','picos']
    .forEach(buildGrid);

  updateResume();

}

refreshAll();
renderLogs();

</script>

</body>
</html>
